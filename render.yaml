services:
  - type: web
    name: btc-sniper
    runtime: node
    plan: free
    rootDir: btc-sniper
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/data
